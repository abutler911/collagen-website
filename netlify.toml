# Netlify configuration for activatedglow.com

# The forms post to /success; serve the success page there.
[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

# Images have stable, unique filenames, so they can be cached for a long time.
[[headers]]
  for = "/public/imgs/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/public/imgs/gallery/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# CSS/JS change with every deploy, so always revalidate before use. Netlify
# serves ETags, so unchanged files return a fast 304 rather than re-downloading.
# This prevents visitors from being served a stale stylesheet or script.
[[headers]]
  for = "/public/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/public/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
